<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MMU Map Project | Home</title>
        <link rel="stylesheet" href="../styles/styles.css">
        <script src="../scripts/home.js"></script>
    </head>
    <body>
        <div id="nav-bar">
            <div id="logo">
                <img id="logoimg" src="https://github.com/HE25890161/A3_4-Map-Project/blob/main/MMU%20Map%20Logo.png?raw=true">
            </div>
            <div id="nav-title">
                <h2>Home</h2>
            </div>
        </div>            
        <h1>Select a Map and Floor</h1>
        <div id="go-box">
            <button id="go-button">View Map</button>
        </div>
        <div id="main-container">
            <div id="left-bar">
                <h2>Maps:</h2>
                <h4 id="map-select-label"></h4>
                <div class="select-box">
                    <h3 class="select-label" id="map-box">Select:</h3>
                    <table class="selectors" id="map-select">
                        <tr>
                            <th>Building Maps</th>
                            <td class="map">Dalton Building</td>
                            <td class="map">Geoffrey Manton Building</td>
                            <td class="map">Brooks Building</td>
                        </tr>
                    </table>
                </div>
                
            </div>

            <div id="right-bar">
                <h2>Floors:</h2>
                <h4 id="floor-select-label"></h4>
                 <div class="select-box">
                    <h3 class="select-label" id="floor-box">Select:</h3>
                    <table class="selectors" id="floor-select">
                        <tr>
                            <th>Floors</th>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
        <h4 id="destination-label"></h4>
        <p>Created for Team Project</p>
    </body>
</html>
